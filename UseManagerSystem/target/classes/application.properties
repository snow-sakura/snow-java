# 应用名称和端口
spring.application.name=UserManagementSystem
server.port=8081

# 数据库连接配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/user_management?useSSL=false&serverTimezone=GMT%2B8&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=wuxuehua123456

# 数据库连接池配置
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# MyBatis配置
mybatis.type-aliases-package=com.snow.usermgt.entity
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 日志级别配置
logging.level.com.snow.usermgt.mapper=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.root=INFO

# 日期时间格式
spring.jackson.time-zone=GMT+8
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# 数据库初始化配置
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# JVM字符编码配置
spring.output.ansi.enabled=ALWAYS

# 启用 Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# 页面
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# 配置 API 文档标题、描述等信息
springdoc.api-docs.title=API Documentation
springdoc.api-docs.description=This is the API documentation for the application.