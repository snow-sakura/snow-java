server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: springai-shop-backend
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shop_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Wxh123456
  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  
  # Spring AI配置
  ai:
    zhipuai:
      api-key: fc0da4c0044144b4b9a62590281b7654.3WnWN4sXcPh08lVH
      chat:
        options:
          model: glm-4
          temperature: 0.7

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT配置
jwt:
  secret: springai-shop-secret-key-2024-very-long-string-for-security
  expiration: 86400000  # 24小时(毫秒)
  header: Authorization
  prefix: "Bearer "

# 日志配置
logging:
  level:
    com.shop: debug
    org.springframework.ai: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# Springdoc OpenAPI (Swagger)配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: 优品商城API文档
    description: 基于Spring AI的商城系统后端接口文档
    version: 1.0.0
    contact:
      name: Lingma
      email: lingma@example.com
